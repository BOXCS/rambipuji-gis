name: Production CD (VPS CyberPanel)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-frontend:
    name: Test & Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run TypeScript Type Check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Verify Frontend Production Build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: "https://rambipuji.research-ai.my.id/api"
          NEXT_PUBLIC_GEOSERVER_URL: "https://rambipuji.research-ai.my.id/geoserver"
        run: npm run build

  test-backend:
    name: Test Backend (Django & PostGIS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: rambipuji_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install GDAL & PostGIS System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev python3-gdal

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python Dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django System Check
        working-directory: ./backend
        env:
          POSTGRES_DB: rambipuji_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          DJANGO_SECRET_KEY: test-secret-key-12345
        run: |
          python manage.py check

      - name: Run Backend Unit & Integration Tests
        working-directory: ./backend
        env:
          POSTGRES_DB: rambipuji_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          DJANGO_SECRET_KEY: test-secret-key-12345
        run: |
          pytest

  deploy:
    name: Deploy to Production Server
    needs: [test-frontend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Ganti path di bawah sesuai lokasi direktori project di VPS
            cd ~/public_html || cd /opt/rambipuji-gis
            chmod +x scripts/deploy-prod.sh
            bash scripts/deploy-prod.sh
