services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: rambipuji_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rambipuji_gis}
      POSTGRES_USER: ${POSTGRES_USER:-rambipuji_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rambipuji_secret_password}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rambipuji_user} -d ${POSTGRES_DB:-rambipuji_gis}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  geoserver:
    image: kartoza/geoserver:2.24.0
    container_name: rambipuji_geoserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-geoserver}
      CORS_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8085:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./geoserver/styles:/opt/geoserver/data_dir/styles
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:8080/geoserver/web/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rambipuji_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./geoserver:/geoserver
      - backend_media:/app/media
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rambipuji_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_GEOSERVER_URL=${NEXT_PUBLIC_GEOSERVER_URL}
      - NEXT_PUBLIC_TOKEN_EXPIRY_HOURS=24
      - INTERNAL_API_URL=${INTERNAL_API_URL}
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    container_name: rambipuji_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
      - geoserver
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_media:/app/media:ro

volumes:
  postgres_data:
  geoserver_data:
  backend_media:
